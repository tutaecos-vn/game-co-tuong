<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Cờ Tướng TuTaEcos</title>
<style>
  body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: transparent; }
  .tuta-game-wrapper { display: flex; flex-wrap: wrap; gap: 20px; background-color: #1b1b1e; padding: 15px; border-radius: 12px; max-width: 700px; margin: 0 auto; color: #e2e2e2; box-sizing: border-box; }
  .tuta-board-section { flex: 1 1 300px; display: flex; justify-content: center; position: relative; user-select: none; }
  .xiangqi-board { width: 100%; aspect-ratio: 9 / 10; background-color: #dcb37b; border: 3px solid #5a3c1c; position: relative; border-radius: 4px; overflow: hidden; }
  .xiangqi-board::before { content: ""; position: absolute; top: 5%; bottom: 5%; left: 5.55%; right: 5.55%; background-image: linear-gradient(#5a3c1c 1px, transparent 1px), linear-gradient(90deg, #5a3c1c 1px, transparent 1px); background-size: 12.5% 11.11%; }
  .xiangqi-board::after { content: "SỞ HÀ                      HÁN GIỚI"; position: absolute; top: 45%; left: 5.55%; right: 5.55%; height: 10%; background-color: #dcb37b; border-top: 1px solid #5a3c1c; border-bottom: 1px solid #5a3c1c; display: flex; align-items: center; justify-content: center; color: #5a3c1c; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
  
  /* Lưới nhận diện click */
  .grid-cell { position: absolute; width: 11.11%; height: 10%; transform: translate(-50%, -50%); cursor: pointer; z-index: 5; }
  .grid-cell:hover { background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; }

  /* Quân cờ */
  .piece { position: absolute; width: 10.5%; height: 9.5%; background-color: #f0d5a3; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: 'KaiTi', 'Times New Roman', serif; font-size: 1.5rem; font-weight: bold; box-shadow: 2px 2px 4px rgba(0,0,0,0.5), inset 1px 1px 2px rgba(255,255,255,0.8); transform: translate(-50%, -50%); cursor: pointer; z-index: 10; transition: left 0.3s ease, top 0.3s ease; }
  .piece.red { color: #c62828; border: 2px solid #c62828; }
  .piece.black { color: #111; border: 2px solid #111; }
  .piece.selected { box-shadow: 0 0 15px 4px #4bd879; border: 2px solid #4bd879; z-index: 11; }

  /* Giao diện UI */
  .tuta-control-section { flex: 1 1 250px; display: flex; flex-direction: column; gap: 12px; }
  .player-card { display: flex; align-items: center; gap: 15px; background: #25262c; padding: 10px 15px; border-radius: 8px; border: 1px solid #33343c; }
  .avatar { width: 40px; height: 40px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
  .player-info { flex: 1; display: flex; flex-direction: column; }
  .player-name { font-weight: 600; font-size: 1rem; color: #fff; }
  .player-title { font-size: 0.8rem; color: #888; }
  select.difficulty-select { background: #1b1b1e; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; outline: none; }
  .status-box { background: #25262c; border: 1px solid #33343c; text-align: center; padding: 12px; border-radius: 8px; color: #e28743; font-weight: bold; transition: 0.3s; }
  .status-box.red-turn { color: #e28743; }
  .status-box.black-turn { color: #aaa; }
  .pgn-box { background: #25262c; border: 1px solid #33343c; border-radius: 8px; padding: 10px 15px; flex-grow: 1; min-height: 80px; max-height: 120px; font-size: 0.9rem; color: #aaa; overflow-y: auto; line-height: 1.6; }
  .action-buttons { display: flex; gap: 10px; }
  .btn-action, .btn-new-game { flex: 1; border: 1px solid #33343c; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 5px; transition: 0.2s; }
  .btn-action { background: #25262c; color: #aaa; }
  .btn-action:hover { background: #33343c; color: #fff; }
  .btn-resign { flex: 0 0 40px; color: #b54949; }
  .btn-new-game { background: #2d5038; color: #4bd879; border-color: #366645; }
  .btn-new-game:hover { background: #366645; color: #fff; }
</style>
</head>
<body>
<div class="tuta-game-wrapper">
  <div class="tuta-board-section">
    <div id="xiangqiboard" class="xiangqi-board">
      <!-- Lưới và quân cờ sẽ sinh ra từ JS -->
    </div>
  </div>
  <div class="tuta-control-section">
    <div class="player-card">
      <div class="avatar" style="background:#e28743;">🤖</div>
      <div class="player-info"><span class="player-name">Tuấn Anh (Bot)</span></div>
      <select class="difficulty-select" id="difficulty">
        <option value="easy" selected>Nghiệp dư</option>
        <option value="medium">Bán chuyên</option>
      </select>
    </div>
    <div class="status-box red-turn" id="game-status">Lượt: Bạn (Đỏ)</div>
    <div class="pgn-box">
      <div style="margin-bottom: 5px; color: #fff; font-weight: bold;">Kỳ phổ (PGN):</div>
      <div id="move-history"></div>
    </div>
    <div class="action-buttons">
      <button class="btn-action" onclick="alert('Tính năng đi lại đang cập nhật!')"><span>⟲</span> Đi lại</button>
      <button class="btn-action btn-resign" onclick="resetGame()"><span>⚑</span></button>
    </div>
    <button class="btn-new-game" onclick="resetGame()"><span>▶</span> Ván Mới</button>
    <div class="player-card">
      <div class="avatar" style="background:#444;">👤</div>
      <div class="player-info"><span class="player-name">Bạn</span><span class="player-title">Người chơi</span></div>
    </div>
  </div>
</div>

<script>
  const boardEl = document.getElementById('xiangqiboard');
  const statusEl = document.getElementById('game-status');
  const historyEl = document.getElementById('move-history');
  
  let pieces = [];
  let currentTurn = 'red';
  let selectedPiece = null;
  let moveCount = 1;

  const initialSetup = [
    { id: 'b_che1', type: '車', color: 'black', x: 0, y: 0 }, { id: 'b_ma1', type: '馬', color: 'black', x: 1, y: 0 }, { id: 'b_tuong1', type: '象', color: 'black', x: 2, y: 0 }, { id: 'b_si1', type: '士', color: 'black', x: 3, y: 0 }, { id: 'b_king', type: '將', color: 'black', x: 4, y: 0 }, { id: 'b_si2', type: '士', color: 'black', x: 5, y: 0 }, { id: 'b_tuong2', type: '象', color: 'black', x: 6, y: 0 }, { id: 'b_ma2', type: '馬', color: 'black', x: 7, y: 0 }, { id: 'b_che2', type: '車', color: 'black', x: 8, y: 0 },
    { id: 'b_phao1', type: '砲', color: 'black', x: 1, y: 2 }, { id: 'b_phao2', type: '砲', color: 'black', x: 7, y: 2 },
    { id: 'b_tot1', type: '卒', color: 'black', x: 0, y: 3 }, { id: 'b_tot2', type: '卒', color: 'black', x: 2, y: 3 }, { id: 'b_tot3', type: '卒', color: 'black', x: 4, y: 3 }, { id: 'b_tot4', type: '卒', color: 'black', x: 6, y: 3 }, { id: 'b_tot5', type: '卒', color: 'black', x: 8, y: 3 },
    { id: 'r_tot1', type: '兵', color: 'red', x: 0, y: 6 }, { id: 'r_tot2', type: '兵', color: 'red', x: 2, y: 6 }, { id: 'r_tot3', type: '兵', color: 'red', x: 4, y: 6 }, { id: 'r_tot4', type: '兵', color: 'red', x: 6, y: 6 }, { id: 'r_tot5', type: '兵', color: 'red', x: 8, y: 6 },
    { id: 'r_phao1', type: '炮', color: 'red', x: 1, y: 7 }, { id: 'r_phao2', type: '炮', color: 'red', x: 7, y: 7 },
    { id: 'r_che1', type: '俥', color: 'red', x: 0, y: 9 }, { id: 'r_ma1', type: '傌', color: 'red', x: 1, y: 9 }, { id: 'r_tuong1', type: '相', color: 'red', x: 2, y: 9 }, { id: 'r_si1', type: '仕', color: 'red', x: 3, y: 9 }, { id: 'r_king', type: '帥', color: 'red', x: 4, y: 9 }, { id: 'r_si2', type: '仕', color: 'red', x: 5, y: 9 }, { id: 'r_tuong2', type: '相', color: 'red', x: 6, y: 9 }, { id: 'r_ma2', type: '傌', color: 'red', x: 7, y: 9 }, { id: 'r_che2', type: '俥', color: 'red', x: 8, y: 9 }
  ];

  function getPercent(x, y) {
    return { left: 5.55 + (x * (88.9 / 8)), top: 5 + (y * (90 / 9)) };
  }

  function initBoard() {
    boardEl.innerHTML = '';
    // Tạo lưới vô hình để hứng sự kiện click (10 hàng x 9 cột)
    for(let y = 0; y <= 9; y++) {
      for(let x = 0; x <= 8; x++) {
        let cell = document.createElement('div');
        cell.className = 'grid-cell';
        let pos = getPercent(x, y);
        cell.style.left = `${pos.left}%`;
        cell.style.top = `${pos.top}%`;
        cell.dataset.x = x; cell.dataset.y = y;
        cell.onclick = () => handleSquareClick(x, y);
        boardEl.appendChild(cell);
      }
    }
    
    // Khởi tạo mảng quân cờ
    pieces = JSON.parse(JSON.stringify(initialSetup));
    pieces.forEach(p => drawPiece(p));
  }

  function drawPiece(p) {
    let div = document.createElement('div');
    div.className = `piece ${p.color}`;
    div.id = p.id;
    div.innerText = p.type;
    let pos = getPercent(p.x, p.y);
    div.style.left = `${pos.left}%`;
    div.style.top = `${pos.top}%`;
    div.onclick = (e) => { e.stopPropagation(); handlePieceClick(p); };
    boardEl.appendChild(div);
  }

  function updatePieceEl(p) {
    let div = document.getElementById(p.id);
    if(div) {
      let pos = getPercent(p.x, p.y);
      div.style.left = `${pos.left}%`;
      div.style.top = `${pos.top}%`;
    }
  }

  function getPieceAt(x, y) {
    return pieces.find(p => p.x === x && p.y === y && !p.captured);
  }

  function handlePieceClick(clickedPiece) {
    if (clickedPiece.captured) return;

    // Chọn quân của mình
    if (clickedPiece.color === currentTurn) {
      if(selectedPiece) document.getElementById(selectedPiece.id).classList.remove('selected');
      selectedPiece = clickedPiece;
      document.getElementById(selectedPiece.id).classList.add('selected');
    } 
    // Nếu đã chọn quân mà bấm vào quân địch -> Ăn quân
    else if (selectedPiece && selectedPiece.color !== clickedPiece.color) {
      executeMove(selectedPiece, clickedPiece.x, clickedPiece.y, clickedPiece);
    }
  }

  function handleSquareClick(x, y) {
    if (selectedPiece && !getPieceAt(x, y)) {
      executeMove(selectedPiece, x, y, null);
    }
  }

  function executeMove(piece, toX, toY, targetPiece) {
    // Ghi PGN
    let actionTxt = targetPiece ? `ăn ${targetPiece.type}` : `đến (${toX},${toY})`;
    let pgn = `[${moveCount}] ${piece.type} ${piece.color==='red'?'Đỏ':'Đen'} ${actionTxt}`;
    
    // Cập nhật logic
    piece.x = toX; piece.y = toY;
    if (targetPiece) {
      targetPiece.captured = true;
      let tEl = document.getElementById(targetPiece.id);
      if(tEl) tEl.style.display = 'none';
      if(targetPiece.type === '將' || targetPiece.type === '帥') {
        setTimeout(() => alert(`${piece.color === 'red' ? 'Bạn' : 'Bot'} đã Thắng!`), 300);
      }
    }
    
    // Cập nhật UI
    updatePieceEl(piece);
    document.getElementById(piece.id).classList.remove('selected');
    selectedPiece = null;

    // Ghi lịch sử
    let historyLine = document.createElement('div');
    historyLine.innerText = pgn;
    historyEl.appendChild(historyLine);
    historyEl.scrollTop = historyEl.scrollHeight;

    // Đổi lượt
    currentTurn = currentTurn === 'red' ? 'black' : 'red';
    if(currentTurn === 'black') {
      statusEl.innerText = 'Lượt: Bot (Đang nghĩ...)';
      statusEl.className = 'status-box black-turn';
      setTimeout(botPlay, 800); // Bot nghĩ 0.8 giây
    } else {
      statusEl.innerText = 'Lượt: Bạn (Đỏ)';
      statusEl.className = 'status-box red-turn';
      moveCount++;
    }
  }

  // AI Cơ bản: Lọc quân Đen chưa chết, chọn ngẫu nhiên 1 quân và tiến lên 1 bước (Hoặc ăn quân)
  function botPlay() {
    let blackPieces = pieces.filter(p => p.color === 'black' && !p.captured);
    if(blackPieces.length === 0) return;
    
    // Tìm thử xem có ăn được quân Đỏ nào gần đó không
    for(let bp of blackPieces) {
      let targets = [
        getPieceAt(bp.x, bp.y + 1), getPieceAt(bp.x, bp.y - 1),
        getPieceAt(bp.x + 1, bp.y), getPieceAt(bp.x - 1, bp.y)
      ];
      for(let t of targets) {
        if(t && t.color === 'red') {
           executeMove(bp, t.x, t.y, t);
           return;
        }
      }
    }

    // Nếu không ăn được, đi ngẫu nhiên 1 bước (ưu tiên tiến lên)
    let moved = false;
    // Xáo trộn mảng quân đen
    blackPieces.sort(() => 0.5 - Math.random());
    for(let bp of blackPieces) {
      let newY = bp.y + 1; // Bot tiến xuống
      if(newY <= 9 && !getPieceAt(bp.x, newY)) {
        executeMove(bp, bp.x, newY, null);
        moved = true;
        break;
      }
    }
    // Nếu kẹt, đi ngang
    if(!moved) {
      for(let bp of blackPieces) {
        let newX = bp.x + (Math.random() > 0.5 ? 1 : -1);
        if(newX >= 0 && newX <= 8 && !getPieceAt(newX, bp.y)) {
          executeMove(bp, newX, bp.y, null);
          break;
        }
      }
    }
  }

  function resetGame() {
    currentTurn = 'red';
    selectedPiece = null;
    moveCount = 1;
    historyEl.innerHTML = '';
    statusEl.innerText = 'Lượt: Bạn (Đỏ)';
    statusEl.className = 'status-box red-turn';
    initBoard();
  }

  // Khởi động
  window.onload = initBoard;
</script>
</body>
</html>
