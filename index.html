<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Cờ Tướng TuTaEcos Ultra AI</title>
<style>
  body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: transparent; }
  .tuta-game-wrapper { display: flex; flex-wrap: wrap; gap: 20px; background-color: #1b1b1e; padding: 15px; border-radius: 12px; max-width: 750px; margin: 0 auto; color: #e2e2e2; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .tuta-board-section { flex: 1 1 320px; display: flex; justify-content: center; position: relative; user-select: none; }
  .xiangqi-board { width: 100%; max-width: 400px; aspect-ratio: 9 / 10; background-color: #dcb37b; border: 3px solid #5a3c1c; position: relative; border-radius: 6px; overflow: hidden; }
  .xiangqi-board::before { 
    content: ""; position: absolute; top: 5%; bottom: 5%; left: 5.55%; right: 5.55%; border-right: 1px solid #5a3c1c; border-bottom: 1px solid #5a3c1c; box-sizing: border-box;
    background-image: 
      linear-gradient(to bottom right, transparent calc(50% - 0.7px), #5a3c1c calc(50% - 0.7px), #5a3c1c calc(50% + 0.7px), transparent calc(50% + 0.7px)),
      linear-gradient(to top right, transparent calc(50% - 0.7px), #5a3c1c calc(50% - 0.7px), #5a3c1c calc(50% + 0.7px), transparent calc(50% + 0.7px)),
      linear-gradient(to bottom right, transparent calc(50% - 0.7px), #5a3c1c calc(50% - 0.7px), #5a3c1c calc(50% + 0.7px), transparent calc(50% + 0.7px)),
      linear-gradient(to top right, transparent calc(50% - 0.7px), #5a3c1c calc(50% - 0.7px), #5a3c1c calc(50% + 0.7px), transparent calc(50% + 0.7px)),
      linear-gradient(#5a3c1c 1px, transparent 1px), linear-gradient(90deg, #5a3c1c 1px, transparent 1px);
    background-size: 25% 22.222%, 25% 22.222%, 25% 22.222%, 25% 22.222%, 12.5% 11.111%, 12.5% 11.111%;
    background-position: 50% 0%, 50% 0%, 50% 100%, 50% 100%, 0 0, 0 0;
    background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, repeat, repeat;
  }
  .xiangqi-board::after { content: "SỞ HÀ                      HÁN GIỚI"; position: absolute; top: 45%; left: 5.55%; right: 5.55%; height: 10%; background-color: #dcb37b; border-top: 1px solid #5a3c1c; border-bottom: 1px solid #5a3c1c; display: flex; align-items: center; justify-content: center; color: #5a3c1c; font-weight: bold; font-size: 1.3rem; letter-spacing: 2px; }
  .grid-cell { position: absolute; width: 11.11%; height: 10%; transform: translate(-50%, -50%); cursor: pointer; z-index: 5; }
  .piece { position: absolute; width: 10.5%; height: 9.5%; background-color: #f0d5a3; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: 'KaiTi', 'Times New Roman', serif; font-size: 1.6rem; font-weight: bold; box-shadow: 2px 2px 5px rgba(0,0,0,0.6); transform: translate(-50%, -50%); cursor: pointer; z-index: 10; transition: left 0.2s, top 0.2s; }
  .piece.red { color: #c62828; border: 2px solid #c62828; }
  .piece.black { color: #111; border: 2px solid #111; }
  .piece.selected { box-shadow: 0 0 12px 4px #4bd879; border: 2px solid #4bd879; z-index: 11; }
  .valid-move-hint { position: absolute; width: 4%; aspect-ratio: 1; background-color: #4bd879; border-radius: 50%; transform: translate(-50%, -50%); z-index: 8; pointer-events: none; }
  .capture-hint { position: absolute; width: 11%; aspect-ratio: 1; background-color: rgba(216, 75, 75, 0.3); border-radius: 50%; border: 3px solid #d84b4b; transform: translate(-50%, -50%); z-index: 9; pointer-events: none; }
  .tuta-control-section { flex: 1 1 250px; display: flex; flex-direction: column; gap: 12px; }
  .player-card { display: flex; align-items: center; gap: 15px; background: #25262c; padding: 10px 15px; border-radius: 8px; border: 1px solid #33343c; }
  .avatar { width: 40px; height: 40px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
  .player-info { flex: 1; display: flex; flex-direction: column; }
  .player-name { font-weight: 600; font-size: 1rem; color: #fff; }
  select.difficulty-select { background: #1b1b1e; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; outline: none; }
  .status-box { background: #25262c; border: 1px solid #33343c; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; }
  .pgn-box { background: #25262c; border: 1px solid #33343c; border-radius: 8px; padding: 12px; height: 180px; display: flex; flex-direction: column; }
  #move-history { flex-grow: 1; overflow-y: auto; color: #aaa; font-size: 0.9rem; }
  .action-buttons { display: flex; gap: 10px; }
  .btn-action, .btn-new-game { flex: 1; border: 1px solid #33343c; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; }
  .btn-new-game { background: #2d5038; color: #4bd879; }
</style>
</head>
<body>
<div class="tuta-game-wrapper">
  <div class="tuta-board-section"><div id="xiangqiboard" class="xiangqi-board"></div></div>
  <div class="tuta-control-section">
    <div class="player-card">
      <div class="avatar" style="background:#e28743;">🤖</div>
      <div class="player-info"><span class="player-name">Tuấn Anh (Bot)</span></div>
      <select class="difficulty-select" id="difficulty">
        <option value="2">Bán chuyên (Sâu 2)</option>
        <option value="4" selected>Chuyên nghiệp (Sâu 4)</option>
      </select>
    </div>
    <div class="status-box" id="game-status">Lượt: Bạn (Đỏ)</div>
    <div class="pgn-box"><div style="color:#fff; font-weight:bold; border-bottom:1px solid #444; padding-bottom:5px;">Kỳ phổ:</div><div id="move-history"></div></div>
    <div class="action-buttons">
      <button class="btn-action" onclick="undoMove()"><span>⟲</span> Đi lại</button>
      <button class="btn-new-game" onclick="resetGame()"><span>▶</span> Ván Mới</button>
    </div>
  </div>
</div>

<script>
  const boardEl = document.getElementById('xiangqiboard');
  const statusEl = document.getElementById('game-status');
  const historyEl = document.getElementById('move-history');
  let pieces = [], currentTurn = 'red', selectedPiece = null, moveCount = 1, gameHistory = [], botTimeoutId = null;

  const pieceValues = { '帥': 10000, '將': 10000, '俥': 900, '車': 900, '炮': 450, '砲': 450, '傌': 400, '馬': 400, '相': 200, '象': 200, '仕': 200, '士': 200, '兵': 100, '卒': 100 };

  const initialSetup = [
    { id: 'b_che1', type: '車', color: 'black', x: 0, y: 0 }, { id: 'b_ma1', type: '馬', color: 'black', x: 1, y: 0 }, { id: 'b_tuong1', type: '象', color: 'black', x: 2, y: 0 }, { id: 'b_si1', type: '士', color: 'black', x: 3, y: 0 }, { id: 'b_king', type: '將', color: 'black', x: 4, y: 0 }, { id: 'b_si2', type: '士', color: 'black', x: 5, y: 0 }, { id: 'b_tuong2', type: '象', color: 'black', x: 6, y: 0 }, { id: 'b_ma2', type: '馬', color: 'black', x: 7, y: 0 }, { id: 'b_che2', type: '車', color: 'black', x: 8, y: 0 },
    { id: 'b_phao1', type: '砲', color: 'black', x: 1, y: 2 }, { id: 'b_phao2', type: '砲', color: 'black', x: 7, y: 2 },
    { id: 'b_tot1', type: '卒', color: 'black', x: 0, y: 3 }, { id: 'b_tot2', type: '卒', color: 'black', x: 2, y: 3 }, { id: 'b_tot3', type: '卒', color: 'black', x: 4, y: 3 }, { id: 'b_tot4', type: '卒', color: 'black', x: 6, y: 3 }, { id: 'b_tot5', type: '卒', color: 'black', x: 8, y: 3 },
    { id: 'r_tot1', type: '兵', color: 'red', x: 0, y: 6 }, { id: 'r_tot2', type: '兵', color: 'red', x: 2, y: 6 }, { id: 'r_tot3', type: '兵', color: 'red', x: 4, y: 6 }, { id: 'r_tot4', type: '兵', color: 'red', x: 6, y: 6 }, { id: 'r_tot5', type: '兵', color: 'red', x: 8, y: 6 },
    { id: 'r_phao1', type: '炮', color: 'red', x: 1, y: 7 }, { id: 'r_phao2', type: '炮', color: 'red', x: 7, y: 7 },
    { id: 'r_che1', type: '俥', color: 'red', x: 0, y: 9 }, { id: 'r_ma1', type: '傌', color: 'red', x: 1, y: 9 }, { id: 'r_tuong1', type: '相', color: 'red', x: 2, y: 9 }, { id: 'r_si1', type: '仕', color: 'red', x: 3, y: 9 }, { id: 'r_king', type: '帥', color: 'red', x: 4, y: 9 }, { id: 'r_si2', type: '仕', color: 'red', x: 5, y: 9 }, { id: 'r_tuong2', type: '相', color: 'red', x: 6, y: 9 }, { id: 'r_ma2', type: '傌', color: 'red', x: 7, y: 9 }, { id: 'r_che2', type: '俥', color: 'red', x: 8, y: 9 }
  ];

  function getPercent(x, y) { return { left: 5.55 + (x * (88.9 / 8)), top: 5 + (y * (90 / 9)) }; }
  function getPieceAt(x, y, board = pieces) { return board.find(p => p.x === x && p.y === y && !p.captured); }

  function initBoard() {
    boardEl.innerHTML = ''; pieces = JSON.parse(JSON.stringify(initialSetup));
    for(let y = 0; y <= 9; y++) {
      for(let x = 0; x <= 8; x++) {
        let cell = document.createElement('div'); cell.className = 'grid-cell';
        let pos = getPercent(x, y); cell.style.left = `${pos.left}%`; cell.style.top = `${pos.top}%`;
        cell.onclick = () => handleSquareClick(x, y); boardEl.appendChild(cell);
      }
    }
    pieces.forEach(p => drawPiece(p)); gameHistory = []; saveState();
  }

  function drawPiece(p) {
    let div = document.createElement('div'); div.className = `piece ${p.color}`; div.id = p.id; div.innerText = p.type;
    let pos = getPercent(p.x, p.y); div.style.left = `${pos.left}%`; div.style.top = `${pos.top}%`;
    div.onclick = (e) => { e.stopPropagation(); handlePieceClick(p); }; boardEl.appendChild(div);
  }

  function saveState() { gameHistory.push({ pieces: JSON.parse(JSON.stringify(pieces)), turn: currentTurn, moveCount: moveCount, pgnHTML: historyEl.innerHTML }); }

  function undoMove() {
    if (gameHistory.length <= 1) return; clearTimeout(botTimeoutId);
    if (currentTurn === 'red') { gameHistory.pop(); gameHistory.pop(); } else { gameHistory.pop(); }
    let state = gameHistory[gameHistory.length - 1]; pieces = JSON.parse(JSON.stringify(state.pieces));
    currentTurn = state.turn; moveCount = state.moveCount; historyEl.innerHTML = state.pgnHTML;
    selectedPiece = null; clearHints(); document.querySelectorAll('.piece').forEach(e => e.remove());
    pieces.forEach(p => drawPiece(p)); statusEl.innerText = 'Lượt: Bạn (Đỏ)';
  }

  function getValidMoves(piece, board = pieces) {
    let moves = [], {x, y, type, color} = piece, isRed = color === 'red', dy = isRed ? -1 : 1;
    function addIfValid(nx, ny) {
      if(nx<0 || nx>8 || ny<0 || ny>9) return false;
      let target = getPieceAt(nx, ny, board);
      if(!target || target.color !== color) moves.push({x: nx, y: ny, target: target});
      return !target;
    }
    if(type === '兵' || type === '卒') { addIfValid(x, y + dy); if((isRed && y <= 4) || (!isRed && y >= 5)) { addIfValid(x + 1, y); addIfValid(x - 1, y); } }
    else if(type === '俥' || type === '車') { for(let i=x+1; i<=8; i++) if(!addIfValid(i, y)) break; for(let i=x-1; i>=0; i--) if(!addIfValid(i, y)) break; for(let i=y+1; i<=9; i++) if(!addIfValid(x, i)) break; for(let i=y-1; i>=0; i--) if(!addIfValid(x, i)) break; }
    else if(type === '炮' || type === '砲') { let dirs = [[1,0],[-1,0],[0,1],[0,-1]]; for(let d of dirs) { let jump = false; for(let i=1; i<10; i++) { let nx = x + d[0]*i, ny = y + d[1]*i; if(nx<0||nx>8||ny<0||ny>9) break; let target = getPieceAt(nx, ny, board); if(!jump) { if(!target) moves.push({x: nx, y: ny, target: null}); else jump = true; } else if(target) { if(target.color !== color) moves.push({x: nx, y: ny, target: target}); break; } } } }
    else if(type === '傌' || type === '馬') { [[1,2], [2,1], [2,-1], [1,-2], [-1,-2], [-2,-1], [-2,1], [-1,2]].forEach(m => { let nx = x + m[0], ny = y + m[1], bx = x + (Math.abs(m[0])==2 ? Math.sign(m[0]) : 0), by = y + (Math.abs(m[1])==2 ? Math.sign(m[1]) : 0); if(!getPieceAt(bx, by, board)) addIfValid(nx, ny); }); }
    else if(type === '相' || type === '象') { [[2,2], [2,-2], [-2,2], [-2,-2]].forEach(m => { let nx = x + m[0], ny = y + m[1]; if((isRed && ny <= 4) || (!isRed && ny >= 5)) return; let bx = x + m[0]/2, by = y + m[1]/2; if(!getPieceAt(bx, by, board)) addIfValid(nx, ny); }); }
    else if(type === '仕' || type === '士') { [[1,1], [1,-1], [-1,1], [-1,-1]].forEach(m => { let nx = x + m[0], ny = y + m[1]; if(nx>=3 && nx<=5 && ((isRed && ny>=7) || (!isRed && ny<=2))) addIfValid(nx, ny); }); }
    else if(type === '帥' || type === '將') { [[0,1],[0,-1],[1,0],[-1,0]].forEach(m => { let nx = x + m[0], ny = y + m[1]; if(nx>=3 && nx<=5 && ((isRed && ny>=7) || (!isRed && ny<=2))) addIfValid(nx, ny); }); }
    return moves;
  }

  function clearHints() { document.querySelectorAll('.valid-move-hint, .capture-hint').forEach(e => e.remove()); }
  function showHints(moves) { clearHints(); moves.forEach(m => { let hint = document.createElement('div'); hint.className = m.target ? 'capture-hint' : 'valid-move-hint'; let pos = getPercent(m.x, m.y); hint.style.left = `${pos.left}%`; hint.style.top = `${pos.top}%`; boardEl.appendChild(hint); }); }

  function handlePieceClick(p) { if (p.captured || currentTurn === 'black') return; if (p.color === currentTurn) { if(selectedPiece) document.getElementById(selectedPiece.id).classList.remove('selected'); selectedPiece = p; document.getElementById(p.id).classList.add('selected'); showHints(getValidMoves(p)); } else if (selectedPiece) { let mv = getValidMoves(selectedPiece).find(m => m.x === p.x && m.y === p.y); if(mv) executeMove(selectedPiece, p.x, p.y, p); } }
  function handleSquareClick(x, y) { if (selectedPiece && currentTurn === 'red') { let mv = getValidMoves(selectedPiece).find(m => m.x === x && m.y === y); if(mv) executeMove(selectedPiece, x, y, null); } }

  function executeMove(piece, toX, toY, target) {
    clearHints(); piece.x = toX; piece.y = toY; let div = document.getElementById(piece.id), pos = getPercent(toX, toY); div.style.left = `${pos.left}%`; div.style.top = `${pos.top}%`;
    if (target) { target.captured = true; document.getElementById(target.id).style.display = 'none'; if(target.type === '將' || target.type === '帥') setTimeout(() => alert(piece.color === 'red' ? 'Thắng!' : 'Thua!'), 300); }
    document.getElementById(piece.id).classList.remove('selected'); selectedPiece = null;
    let hLine = document.createElement('div'); hLine.innerText = `[${moveCount}] ${piece.type}${piece.color==='red'?'Đỏ':'Đen'}->(${toX},${toY})`; historyEl.appendChild(hLine); historyEl.scrollTop = historyEl.scrollHeight;
    currentTurn = currentTurn === 'red' ? 'black' : 'red'; if(currentTurn === 'red') moveCount++; saveState();
    if(currentTurn === 'black') { statusEl.innerText = 'Bot đang nghĩ...'; botTimeoutId = setTimeout(botPlay, 500); } else statusEl.innerText = 'Lượt: Bạn';
  }

  // --- AI ALPHA-BETA PRUNING ---
  function evaluateBoard(board) {
    let score = 0;
    board.forEach(p => {
      if (!p.captured) {
        let val = pieceValues[p.type] || 0;
        // Thưởng vị trí trung tâm & áp sát cung
        if (p.type === '卒' || p.type === '兵') val += (p.color === 'black' ? p.y : 9 - p.y) * 10;
        score += (p.color === 'black' ? val : -val);
      }
    });
    return score;
  }

  function minimax(board, depth, alpha, beta, isMaximizing) {
    if (depth === 0) return evaluateBoard(board);
    let blackPieces = board.filter(p => p.color === 'black' && !p.captured);
    let redPieces = board.filter(p => p.color === 'red' && !p.captured);
    
    if (isMaximizing) {
      let maxEval = -Infinity;
      for (let p of blackPieces) {
        for (let m of getValidMoves(p, board)) {
          let oldX = p.x, oldY = p.y, target = m.target;
          p.x = m.x; p.y = m.y; if (target) target.captured = true;
          let ev = minimax(board, depth - 1, alpha, beta, false);
          p.x = oldX; p.y = oldY; if (target) target.captured = false;
          maxEval = Math.max(maxEval, ev); alpha = Math.max(alpha, ev);
          if (beta <= alpha) break;
        }
      }
      return maxEval;
    } else {
      let minEval = Infinity;
      for (let p of redPieces) {
        for (let m of getValidMoves(p, board)) {
          let oldX = p.x, oldY = p.y, target = m.target;
          p.x = m.x; p.y = m.y; if (target) target.captured = true;
          let ev = minimax(board, depth - 1, alpha, beta, true);
          p.x = oldX; p.y = oldY; if (target) target.captured = false;
          minEval = Math.min(minEval, ev); beta = Math.min(beta, ev);
          if (beta <= alpha) break;
        }
      }
      return minEval;
    }
  }

  function botPlay() {
    let depth = parseInt(document.getElementById('difficulty').value);
    let bestMove = null, maxEval = -Infinity;
    let blackPieces = pieces.filter(p => p.color === 'black' && !p.captured);
    
    for (let p of blackPieces) {
      for (let m of getValidMoves(p)) {
        let oldX = p.x, oldY = p.y, target = m.target;
        p.x = m.x; p.y = m.y; if (target) target.captured = true;
        let ev = minimax(pieces, depth - 1, -Infinity, Infinity, false);
        p.x = oldX; p.y = oldY; if (target) target.captured = false;
        if (ev > maxEval) { maxEval = ev; bestMove = { p, m }; }
      }
    }
    if (bestMove) executeMove(bestMove.p, bestMove.m.x, bestMove.m.y, bestMove.m.target);
  }

  function resetGame() { clearTimeout(botTimeoutId); initBoard(); statusEl.innerText = 'Lượt: Bạn'; moveCount = 1; historyEl.innerHTML = ''; }
  window.onload = initBoard;
</script>
</body>
</html>
